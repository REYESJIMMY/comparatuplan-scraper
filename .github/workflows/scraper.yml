name: Scraper CRC — Sincronización Diaria

on:
  # Todos los días a las 7:10 AM hora Colombia (UTC-5 = 12:10 UTC)
  schedule:
    - cron: "10 12 * * *"

  # Ejecución manual desde GitHub Actions
  workflow_dispatch:
    inputs:
      modo:
        description: "Modo de ejecución"
        required: true
        default: "completo"
        type: choice
        options:
          - completo
          - test

jobs:
  scraper:
    name: Sincronizar planes CRC → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install aiohttp python-dotenv

      - name: Crear .env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "--- Contenido .env (sin valores) ---"
          cat .env | sed 's/=.*/=***/'
          echo "--- Variables de entorno ---"
          python -c "import os; from dotenv import load_dotenv; load_dotenv(); print('SUPABASE_URL:', bool(os.getenv('SUPABASE_URL')))"
      - name: Ejecutar scraper completo
        if: ${{ github.event.inputs.modo != 'test' }}
        run: python main.py

      - name: Ejecutar scraper TEST (3 páginas)
        if: ${{ github.event.inputs.modo == 'test' }}
        run: python main.py --test

      - name: Notificar resultado
        if: failure()
        run: |
          echo "❌ El scraper falló — revisar logs arriba"
          exit 1
