$yml = @'
name: Scraper CRC - Sincronizacion Diaria

on:
  schedule:
    - cron: "10 12 * * *"
  workflow_dispatch:
    inputs:
      modo:
        description: "Modo de ejecucion"
        required: true
        default: "completo"
        type: choice
        options:
          - completo
          - test

jobs:
  scraper:
    name: Sincronizar planes CRC a Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install aiohttp python-dotenv

      - name: Crear .env
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_SERVICE_KEY=$SUPABASE_SERVICE_KEY" >> .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
          cat .env | sed 's/=.*/=***/'
          python -c "import os; from dotenv import load_dotenv; load_dotenv(); print('SUPABASE_URL:', bool(os.getenv('SUPABASE_URL')))"

      - name: Ejecutar scraper completo
        if: ${{ github.event.inputs.modo != 'test' }}
        run: python main.py

      - name: Ejecutar scraper TEST
        if: ${{ github.event.inputs.modo == 'test' }}
        run: python main.py --test

      - name: Notificar resultado
        if: failure()
        run: |
          echo "Scraper fallo - revisar logs arriba"
          exit 1
'@

$yml | Out-File -Encoding utf8 .github\workflows\scraper.yml